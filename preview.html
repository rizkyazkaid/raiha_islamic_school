<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rekap Absen & Nilai</title>
<style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
    h1 { text-align: center; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
    th { background-color: #007BFF; color: white; }
    input, select, button { padding: 6px; margin: 4px 0; }
    .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
</style>
</head>
<body>
<div class="container">
<h1>Rekap Absen & Nilai</h1>

<label for="nama">Nama Siswa:</label>
<input type="text" id="nama">

<label for="kelas">Kelas:</label>
<select id="kelas">
    <option value="10A">10A</option>
    <option value="10B">10B</option>
    <option value="11A">11A</option>
    <option value="11B">11B</option>
</select>

<label for="nilai">Nilai:</label>
<input type="number" id="nilai" min="0" max="100">

<label for="absen">Absen (Hadir/Tidak):</label>
<select id="absen">
    <option value="Hadir">Hadir</option>
    <option value="Tidak Hadir">Tidak Hadir</option>
</select>

<button onclick="tambahData()">Tambah</button>
<button onclick="exportData()">Export CSV</button>

<table id="tabel">
    <thead>
        <tr>
            <th>Nama</th>
            <th>Kelas</th>
            <th>Nilai</th>
            <th>Absen</th>
        </tr>
    </thead>
    <tbody>
    </tbody>
</table>
</div>

<script>
let data = [];

function tambahData() {
    const nama = document.getElementById('nama').value.trim();
    const kelas = document.getElementById('kelas').value;
    const nilai = parseInt(document.getElementById('nilai').value);
    const absen = document.getElementById('absen').value;

    if (!nama || isNaN(nilai)) {
        alert('Nama dan nilai harus diisi dengan benar.');
        return;
    }

    data.push({nama, kelas, nilai, absen});
    renderTabel();
    clearInput();
}

function renderTabel() {
    const tbody = document.getElementById('tabel').getElementsByTagName('tbody')[0];
    tbody.innerHTML = '';
    data.forEach(d => {
        const row = tbody.insertRow();
        row.insertCell(0).innerText = d.nama;
        row.insertCell(1).innerText = d.kelas;
        row.insertCell(2).innerText = d.nilai;
        row.insertCell(3).innerText = d.absen;
    });
}

function clearInput() {
    document.getElementById('nama').value = '';
    document.getElementById('nilai').value = '';
    document.getElementById('absen').value = 'Hadir';
}

function exportData() {
    let csv = 'Nama,Kelas,Nilai,Absen\n';
    data.forEach(d => {
        csv += `${d.nama},${d.kelas},${d.nilai},${d.absen}\n`;
    });
    const blob = new Blob([csv], {type: 'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'rekap_absen.csv';
    a.click();
    URL.revokeObjectURL(url);
}
</script>
</body>
</html>
