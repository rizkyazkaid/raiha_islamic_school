<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rekap Absen & Nilai - Raiha Islamic School</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
    }

    .container {
        max-width: 1200px;
        margin: auto;
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    }

    h1 {
        text-align: center;
        color: #333;
        margin-bottom: 10px;
        font-size: 2.5em;
    }

    .subtitle {
        text-align: center;
        color: #666;
        margin-bottom: 30px;
        font-size: 0.95em;
    }

    .input-section {
        background: #f8f9fa;
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 30px;
        border-left: 4px solid #667eea;
    }

    .form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 15px;
        margin-bottom: 15px;
    }

    .form-group {
        display: flex;
        flex-direction: column;
    }

    label {
        font-weight: 600;
        margin-bottom: 5px;
        color: #333;
        font-size: 0.9em;
    }

    input, select {
        padding: 10px;
        border: 2px solid #ddd;
        border-radius: 6px;
        font-size: 0.95em;
        transition: border-color 0.3s;
    }

    input:focus, select:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .button-group {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 10px;
    }

    button {
        padding: 12px 20px;
        border: none;
        border-radius: 6px;
        font-size: 0.95em;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
    }

    .btn-add {
        background: #28a745;
        color: white;
    }

    .btn-add:hover {
        background: #218838;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
    }

    .btn-export {
        background: #007bff;
        color: white;
    }

    .btn-export:hover {
        background: #0056b3;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 123, 255, 0.3);
    }

    .btn-clear {
        background: #dc3545;
        color: white;
    }

    .btn-clear:hover {
        background: #c82333;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(220, 53, 69, 0.3);
    }

    .btn-edit {
        background: #ffc107;
        color: #333;
        padding: 6px 12px;
        font-size: 0.85em;
    }

    .btn-edit:hover {
        background: #e0a800;
    }

    .btn-delete {
        background: #dc3545;
        color: white;
        padding: 6px 12px;
        font-size: 0.85em;
    }

    .btn-delete:hover {
        background: #c82333;
    }

    .stats-section {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
        margin: 30px 0;
    }

    .stat-card {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 20px;
        border-radius: 8px;
        text-align: center;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }

    .stat-card.hadir {
        background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
    }

    .stat-card.tidak {
        background: linear-gradient(135deg, #dc3545 0%, #fd7e14 100%);
    }

    .stat-value {
        font-size: 2em;
        font-weight: bold;
        margin: 10px 0;
    }

    .stat-label {
        font-size: 0.9em;
        opacity: 0.9;
    }

    .filter-section {
        background: #f8f9fa;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 20px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
        align-items: end;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
    }

    th {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 15px;
        text-align: left;
        font-weight: 600;
    }

    td {
        border-bottom: 1px solid #ddd;
        padding: 12px 15px;
    }

    tr:hover {
        background: #f8f9fa;
    }

    .action-buttons {
        display: flex;
        gap: 5px;
    }

    .empty-state {
        text-align: center;
        padding: 40px;
        color: #999;
    }

    .empty-state-icon {
        font-size: 3em;
        margin-bottom: 10px;
    }

    .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
    }

    .modal-content {
        background-color: white;
        margin: 5% auto;
        padding: 30px;
        border-radius: 8px;
        width: 90%;
        max-width: 500px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    }

    .modal-header {
        font-size: 1.5em;
        font-weight: bold;
        margin-bottom: 20px;
        color: #333;
    }

    .close {
        color: #999;
        float: right;
        font-size: 28px;
        font-weight: bold;
        cursor: pointer;
    }

    .close:hover {
        color: #333;
    }

    .modal-buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 20px;
    }

    .btn-cancel {
        background: #6c757d;
        color: white;
    }

    .btn-cancel:hover {
        background: #5a6268;
    }

    .btn-save {
        background: #28a745;
        color: white;
    }

    .btn-save:hover {
        background: #218838;
    }

    .alert {
        padding: 15px;
        margin-bottom: 20px;
        border-radius: 6px;
        display: none;
    }

    .alert-success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
    }

    .alert-error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
    }

    .alert.show {
        display: block;
    }

    @media (max-width: 768px) {
        .container {
            padding: 15px;
        }

        h1 {
            font-size: 1.8em;
        }

        .form-grid {
            grid-template-columns: 1fr;
        }

        .button-group {
            grid-template-columns: 1fr;
        }

        table {
            font-size: 0.9em;
        }

        th, td {
            padding: 8px;
        }
    }
</style>
</head>
<body>
<div class="container">
    <h1>📚 Rekap Absen & Nilai</h1>
    <p class="subtitle">Raiha Islamic School</p>

    <div class="alert alert-success" id="successAlert"></div>
    <div class="alert alert-error" id="errorAlert"></div>

    <!-- Input Section -->
    <div class="input-section">
        <div class="form-grid">
            <div class="form-group">
                <label for="nama">👤 Nama Siswa</label>
                <input type="text" id="nama" placeholder="Masukkan nama siswa">
            </div>
            <div class="form-group">
                <label for="kelas">🏫 Kelas</label>
                <select id="kelas">
                    <option value="">-- Pilih Kelas --</option>
                    <option value="10A">Kelas 10A</option>
                    <option value="10B">Kelas 10B</option>
                    <option value="11A">Kelas 11A</option>
                    <option value="11B">Kelas 11B</option>
                    <option value="12A">Kelas 12A</option>
                    <option value="12B">Kelas 12B</option>
                </select>
            </div>
            <div class="form-group">
                <label for="nilai">📊 Nilai (0-100)</label>
                <input type="number" id="nilai" min="0" max="100" placeholder="Masukkan nilai">
            </div>
            <div class="form-group">
                <label for="absen">✅ Status Absen</label>
                <select id="absen">
                    <option value="Hadir">✅ Hadir</option>
                    <option value="Tidak Hadir">❌ Tidak Hadir</option>
                    <option value="Sakit">🤒 Sakit</option>
                    <option value="Izin">📝 Izin</option>
                </select>
            </div>
        </div>
        <div class="button-group">
            <button class="btn-add" onclick="tambahData()">➕ Tambah Data</button>
            <button class="btn-export" onclick="exportCSV()">📥 Export CSV</button>
            <button class="btn-export" onclick="printData()">🖨️ Print</button>
            <button class="btn-clear" onclick="clearAllData()">🗑️ Hapus Semua</button>
        </div>
    </div>

    <!-- Statistics Section -->
    <div class="stats-section" id="statsSection"></div>

    <!-- Filter Section -->
    <div class="filter-section">
        <div class="form-group">
            <label for="filterKelas">Filter Kelas:</label>
            <select id="filterKelas" onchange="filterData()">
                <option value="">-- Semua Kelas --</option>
                <option value="10A">Kelas 10A</option>
                <option value="10B">Kelas 10B</option>
                <option value="11A">Kelas 11A</option>
                <option value="11B">Kelas 11B</option>
                <option value="12A">Kelas 12A</option>
                <option value="12B">Kelas 12B</option>
            </select>
        </div>
        <div class="form-group">
            <label for="filterAbsen">Filter Absen:</label>
            <select id="filterAbsen" onchange="filterData()">
                <option value="">-- Semua Status --</option>
                <option value="Hadir">✅ Hadir</option>
                <option value="Tidak Hadir">❌ Tidak Hadir</option>
                <option value="Sakit">🤒 Sakit</option>
                <option value="Izin">📝 Izin</option>
            </select>
        </div>
        <div class="form-group">
            <label for="searchNama">Cari Nama:</label>
            <input type="text" id="searchNama" placeholder="Ketik nama..." onkeyup="filterData()">
        </div>
        <button class="btn-export" onclick="resetFilter()">🔄 Reset Filter</button>
    </div>

    <!-- Table Section -->
    <table id="tabel">
        <thead>
            <tr>
                <th>No</th>
                <th>Nama</th>
                <th>Kelas</th>
                <th>Nilai</th>
                <th>Absen</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td colspan="6" class="empty-state">
                    <div class="empty-state-icon">📭</div>
                    <div>Belum ada data. Silakan tambahkan data baru.</div>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<!-- Modal Edit -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <div class="modal-header">✏️ Edit Data</div>
        <div class="form-grid">
            <div class="form-group">
                <label for="editNama">Nama Siswa</label>
                <input type="text" id="editNama">
            </div>
            <div class="form-group">
                <label for="editKelas">Kelas</label>
                <select id="editKelas">
                    <option value="10A">Kelas 10A</option>
                    <option value="10B">Kelas 10B</option>
                    <option value="11A">Kelas 11A</option>
                    <option value="11B">Kelas 11B</option>
                    <option value="12A">Kelas 12A</option>
                    <option value="12B">Kelas 12B</option>
                </select>
            </div>
            <div class="form-group">
                <label for="editNilai">Nilai</label>
                <input type="number" id="editNilai" min="0" max="100">
            </div>
            <div class="form-group">
                <label for="editAbsen">Status Absen</label>
                <select id="editAbsen">
                    <option value="Hadir">✅ Hadir</option>
                    <option value="Tidak Hadir">❌ Tidak Hadir</option>
                    <option value="Sakit">🤒 Sakit</option>
                    <option value="Izin">📝 Izin</option>
                </select>
            </div>
        </div>
        <div class="modal-buttons">
            <button class="btn-cancel" onclick="closeModal()">Batal</button>
            <button class="btn-save" onclick="saveEdit()">Simpan</button>
        </div>
    </div>
</div>

<script>
    let data = [];
    let filteredData = [];
    let editIndex = -1;

    // Load data from localStorage on page load
    window.addEventListener('load', function() {
        loadFromLocalStorage();
        renderTabel();
        updateStats();
    });

    function loadFromLocalStorage() {
        const saved = localStorage.getItem('rekapData');
        if (saved) {
            data = JSON.parse(saved);
        }
    }

    function saveToLocalStorage() {
        localStorage.setItem('rekapData', JSON.stringify(data));
    }

    function showAlert(message, type = 'success') {
        const alert = document.getElementById(type === 'success' ? 'successAlert' : 'errorAlert');
        alert.textContent = message;
        alert.classList.add('show');
        setTimeout(() => alert.classList.remove('show'), 3000);
    }

    function tambahData() {
        const nama = document.getElementById('nama').value.trim();
        const kelas = document.getElementById('kelas').value;
        const nilai = parseInt(document.getElementById('nilai').value);
        const absen = document.getElementById('absen').value;

        if (!nama || !kelas || isNaN(nilai) || !absen) {
            showAlert('❌ Semua field harus diisi dengan benar!', 'error');
            return;
        }

        if (nilai < 0 || nilai > 100) {
            showAlert('❌ Nilai harus antara 0-100!', 'error');
            return;
        }

        data.push({nama, kelas, nilai, absen});
        saveToLocalStorage();
        renderTabel();
        updateStats();
        clearInput();
        showAlert('✅ Data berhasil ditambahkan!', 'success');
    }

    function renderTabel() {
        const tbody = document.getElementById('tabel').getElementsByTagName('tbody')[0];
        filteredData = data;

        if (filteredData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="empty-state"><div class="empty-state-icon">📭</div><div>Belum ada data. Silakan tambahkan data baru.</div></td></tr>';
            return;
        }

        tbody.innerHTML = '';
        filteredData.forEach((d, index) => {
            const actualIndex = data.indexOf(d);
            const row = tbody.insertRow();
            row.insertCell(0).innerText = index + 1;
            row.insertCell(1).innerText = d.nama;
            row.insertCell(2).innerText = d.kelas;
            row.insertCell(3).innerText = d.nilai;
            row.insertCell(4).innerText = d.absen;
            
            const actionCell = row.insertCell(5);
            actionCell.innerHTML = `
                <div class="action-buttons">
                    <button class="btn-edit" onclick="openEditModal(${actualIndex})">Edit</button>
                    <button class="btn-delete" onclick="deleteData(${actualIndex})">Hapus</button>
                </div>
            `;
        });
    }

    function openEditModal(index) {
        editIndex = index;
        const d = data[index];
        document.getElementById('editNama').value = d.nama;
        document.getElementById('editKelas').value = d.kelas;
        document.getElementById('editNilai').value = d.nilai;
        document.getElementById('editAbsen').value = d.absen;
        document.getElementById('editModal').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('editModal').style.display = 'none';
        editIndex = -1;
    }

    function saveEdit() {
        const nama = document.getElementById('editNama').value.trim();
        const kelas = document.getElementById('editKelas').value;
        const nilai = parseInt(document.getElementById('editNilai').value);
        const absen = document.getElementById('editAbsen').value;

        if (!nama || !kelas || isNaN(nilai) || !absen) {
            showAlert('❌ Semua field harus diisi dengan benar!', 'error');
            return;
        }

        data[editIndex] = {nama, kelas, nilai, absen};
        saveToLocalStorage();
        renderTabel();
        updateStats();
        closeModal();
        showAlert('✅ Data berhasil diperbarui!', 'success');
    }

    function deleteData(index) {
        if (confirm('Apakah Anda yakin ingin menghapus data ini?')) {
            data.splice(index, 1);
            saveToLocalStorage();
            renderTabel();
            updateStats();
            showAlert('✅ Data berhasil dihapus!', 'success');
        }
    }

    function clearInput() {
        document.getElementById('nama').value = '';
        document.getElementById('kelas').value = '';
        document.getElementById('nilai').value = '';
        document.getElementById('absen').value = 'Hadir';
    }

    function updateStats() {
        const total = data.length;
        const hadir = data.filter(d => d.absen === 'Hadir').length;
        const tidakHadir = data.filter(d => d.absen === 'Tidak Hadir').length;
        const sakit = data.filter(d => d.absen === 'Sakit').length;
        const izin = data.filter(d => d.absen === 'Izin').length;
        const rataRataNilai = total > 0 ? (data.reduce((sum, d) => sum + d.nilai, 0) / total).toFixed(2) : 0;

        const statsHTML = `
            <div class="stat-card">
                <div class="stat-label">Total Siswa</div>
                <div class="stat-value">${total}</div>
            </div>
            <div class="stat-card hadir">
                <div class="stat-label">✅ Hadir</div>
                <div class="stat-value">${hadir}</div>
            </div>
            <div class="stat-card tidak">
                <div class="stat-label">❌ Tidak Hadir</div>
                <div class="stat-value">${tidakHadir}</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">🤒 Sakit</div>
                <div class="stat-value">${sakit}</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">📝 Izin</div>
                <div class="stat-value">${izin}</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">📊 Rata-rata Nilai</div>
                <div class="stat-value">${rataRataNilai}</div>
            </div>
        `;
        document.getElementById('statsSection').innerHTML = statsHTML;
    }

    function filterData() {
        const filterKelas = document.getElementById('filterKelas').value;
        const filterAbsen = document.getElementById('filterAbsen').value;
        const searchNama = document.getElementById('searchNama').value.toLowerCase();

        filteredData = data.filter(d => {
            const kelasMatch = !filterKelas || d.kelas === filterKelas;
            const absenMatch = !filterAbsen || d.absen === filterAbsen;
            const namaMatch = !searchNama || d.nama.toLowerCase().includes(searchNama);
            return kelasMatch && absenMatch && namaMatch;
        });

        renderTabel();
    }

    function resetFilter() {
        document.getElementById('filterKelas').value = '';
        document.getElementById('filterAbsen').value = '';
        document.getElementById('searchNama').value = '';
        filteredData = data;
        renderTabel();
    }

    function exportCSV() {
        if (data.length === 0) {
            showAlert('❌ Tidak ada data untuk diekspor!', 'error');
            return;
        }

        let csv = 'No,Nama,Kelas,Nilai,Absen\n';
        data.forEach((d, index) => {
            csv += `${index + 1},"${d.nama}",${d.kelas},${d.nilai},${d.absen}\n`;
        });

        const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.setAttribute('href', url);
        link.setAttribute('download', `rekap_absen_${new Date().toISOString().slice(0,10)}.csv`);
        link.click();
        URL.revokeObjectURL(url);
        showAlert('✅ Data berhasil diekspor!', 'success');
    }

    function printData() {
        if (data.length === 0) {
            showAlert('❌ Tidak ada data untuk dicetak!', 'error');
            return;
        }

        let printWindow = window.open('', '', 'height=500,width=800');
        let html = `
            <html>
            <head>
                <title>Rekap Absen & Nilai</title>
                <style>
                    body { font-family: Arial; margin: 20px; }
                    h1 { text-align: center; }
                    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
                    th, td { border: 1px solid #999; padding: 8px; text-align: center; }
                    th { background-color: #667eea; color: white; }
                </style>
            </head>
            <body>
                <h1>Rekap Absen & Nilai - Raiha Islamic School</h1>
                <p>Tanggal: ${new Date().toLocaleDateString('id-ID')}</p>
                <table>
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Nama</th>
                            <th>Kelas</th>
                            <th>Nilai</th>
                            <th>Absen</th>
                        </tr>
                    </thead>
                    <tbody>
        `;

        data.forEach((d, index) => {
            html += `<tr><td>${index + 1}</td><td>${d.nama}</td><td>${d.kelas}</td><td>${d.nilai}</td><td>${d.absen}</td></tr>`;
        });

        html += `
                    </tbody>
                </table>
            </body>
            </html>
        `;

        printWindow.document.write(html);
        printWindow.document.close();
        printWindow.print();
    }

    function clearAllData() {
        if (confirm('⚠️ Apakah Anda yakin ingin menghapus SEMUA data? Tindakan ini tidak dapat dibatalkan!')) {
            data = [];
            saveToLocalStorage();
            renderTabel();
            updateStats();
            showAlert('✅ Semua data berhasil dihapus!', 'success');
        }
    }

    // Close modal when clicking outside
    window.onclick = function(event) {
        const modal = document.getElementById('editModal');
        if (event.target == modal) {
            closeModal();
        }
    }
</script>
</body>
</html>
